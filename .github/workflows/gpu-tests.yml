name: GPU Verification

on:
  workflow_dispatch:
  schedule:
    # Nightly at 09:17 UTC — CUDA paths have no other CI coverage
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: openboost-modal-gpu-verification
  cancel-in-progress: false

jobs:
  modal-gpu-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install locked dependencies
        run: uv sync --locked --extra bench

      - name: Run CUDA verification on Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: uv run modal run tests/modal_gpu_tests.py::ci
